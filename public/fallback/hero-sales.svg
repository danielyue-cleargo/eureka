<svg xmlns="http://www.w3.org/2000/svg" width="720" height="480" viewBox="0 0 720 480" role="img" aria-labelledby="title desc">
  <title id="title">Sales Hero Placeholder</title>
  <desc id="desc">Fallback hero banner when external assets are unavailable.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7c9d8"/>
      <stop offset="100%" stop-color="#f3e2a0"/>
    </linearGradient>
  </defs>
  <rect width="720" height="480" fill="url(#bg)"/>
  <ellipse cx="590" cy="90" rx="90" ry="60" fill="#ffffff" fill-opacity="0.35"/>
  <ellipse cx="150" cy="380" rx="120" ry="80" fill="#ffffff" fill-opacity="0.25"/>
  <text x="60" y="170" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#5a2f3f">SPRING SAVINGS</text>
  <text x="60" y="230" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="600" fill="#5a2f3f">Up to EUR400 off selected models</text>
